# Alembic configuration for tg-listener.
# sqlalchemy.url is overridden by env.py using DBSettings.url.

[alembic]
script_location = src/tg_listener/db/migrations
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 40
timezone = UTC

# Leave blank — env.py reads DB_URL from environment.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
