services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: tg_listener
      POSTGRES_PASSWORD: tg_listener
      POSTGRES_DB: tg_listener
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
