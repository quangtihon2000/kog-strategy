services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      # Unambiguous alias — `postgres` collides with portfolio-engine's
      # postgres on the shared portfolio-network, and web (which joins both
      # networks) would otherwise resolve `postgres` to the wrong instance
      # and fail auth.
      default:
        aliases:
          - strategy-stats-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingest:
    build:
      context: ../..
      dockerfile: services/strategy-stats/Dockerfile.ingest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: strategy-stats-postgres
      POSTGRES_PORT: 5432
      UPSTREAM_REDIS_URL: ${UPSTREAM_REDIS_URL}
      REDIS_STREAM_PREFIX: ${REDIS_STREAM_PREFIX:-}
      INGEST_BATCH_COUNT: ${INGEST_BATCH_COUNT:-64}
      INGEST_BLOCK_MS: ${INGEST_BLOCK_MS:-5000}
      INGEST_CONSUMER_NAME: ${INGEST_CONSUMER_NAME:-stats-worker-1}

  web:
    build:
      context: ../..
      dockerfile: services/strategy-stats/Dockerfile.web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: strategy-stats-postgres
      POSTGRES_PORT: 5432
      BASIC_AUTH_USER: ${BASIC_AUTH_USER}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD}
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:8080"
    networks:
      default: {}
      portfolio:
        aliases:
          - strategy-stats-web

networks:
  default: {}
  portfolio:
    name: portfolio-engine_portfolio-network
    external: true

volumes:
  pg-data:
