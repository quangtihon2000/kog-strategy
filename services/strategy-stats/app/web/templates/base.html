<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}Strategy Stats{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <header class="bg-slate-900 text-white">
    <nav class="max-w-7xl mx-auto px-3 sm:px-4 py-3 flex flex-wrap items-center gap-x-4 sm:gap-x-6 gap-y-1 text-sm">
      <a href="/" class="font-semibold tracking-wide">Strategy Stats</a>
      <a href="/conde" class="hover:text-amber-300">Conde</a>
      <a href="/conde/channel-stats" class="hover:text-amber-300">Conde · Channels</a>
      <a href="/gvfx" class="hover:text-amber-300">GVFX</a>
      <a href="/zone" class="hover:text-amber-300">Zone</a>
      <span class="ml-auto opacity-60 text-xs sm:text-sm">{{ now_str }}</span>
    </nav>
  </header>
  <main class="max-w-7xl mx-auto px-3 sm:px-4 py-4 sm:py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
