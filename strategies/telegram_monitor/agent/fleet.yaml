# Fleet inventory — list of VPSes and services the bot monitors.
#
# Phase 0 supports `transport: local` only (bot runs on the same VPS).
# Phase 1 will add `transport: ssh` with `host`, `user`, `key_path` keys
# for fan-out across multiple VPSes. The handler/monitor code does NOT
# change — only the transports layer is extended.
#
# Paths are absolute on the VPS. On the runner they are also resolvable
# because the repo lives at the same drive layout.

vpses:
  - name: vps-main
    transport: local
    services:
      - name: zone_signal
        nssm_service: zone_signal_agent
        agent_dir: C:\actions-runner\_work\kog-strategy\kog-strategy\strategies\zone_signal\agent
        log_dir: C:\actions-runner\_work\kog-strategy\kog-strategy\strategies\zone_signal\agent\logs
        signal_dir: C:\actions-runner\_work\kog-strategy\kog-strategy\strategies\zone_signal\data
        signal_freshness_min: 30
        mt5_logs:
          - account: "25312392"
            log_dir: C:\Users\QuangXAU\AppData\Roaming\MetaQuotes\Terminal\7D70CC401B91FAC031C1DD6731E80E7A\MQL5\Logs

      - name: conde_auto_entry
        nssm_service: conde_signal_agent
        agent_dir: C:\actions-runner\_work\kog-strategy\kog-strategy\strategies\conde_auto_entry\agent
        log_dir: C:\actions-runner\_work\kog-strategy\kog-strategy\strategies\conde_auto_entry\agent\logs
        signal_dir: C:\actions-runner\_work\kog-strategy\kog-strategy\strategies\conde_auto_entry\data
        signal_freshness_min: 5
        mt5_logs:
          - account: "25314214"
            log_dir: C:\Users\QuangXAU\AppData\Roaming\MetaQuotes\Terminal\D0E8209F77C8CF37AD8BF550E51FF075\MQL5\Logs

      - name: gvfx_signal
        nssm_service: gvfx_signal_agent
        agent_dir: C:\actions-runner\_work\kog-strategy\kog-strategy\strategies\gvfx_signal\agent
        log_dir: C:\actions-runner\_work\kog-strategy\kog-strategy\strategies\gvfx_signal\agent\logs
        signal_dir: C:\actions-runner\_work\kog-strategy\kog-strategy\strategies\gvfx_signal\data
        signal_freshness_min: 60
        mt5_logs:
          - account: "25318677"
            log_dir: C:\Users\QuangXAU\AppData\Roaming\MetaQuotes\Terminal\0696FF550C099AD93E51F997F5A09924\MQL5\Logs

      # GitHub Actions self-hosted runner. Wrapped by NSSM as service
      # `github-runner` (see telegram_monitor CLAUDE.md). No signal files —
      # signal_dir/freshness omitted so /signals and freshness checks skip it.
      - name: github_runner
        nssm_service: github-runner
        agent_dir: C:\actions-runner
        log_dir: C:\actions-runner\_diag
