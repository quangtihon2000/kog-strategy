name: strategy-stats deploy

on:
  push:
    branches: [main]
    paths:
      - 'services/strategy-stats/**'
      - '.github/workflows/strategy-stats-deploy.yml'
  workflow_dispatch:

concurrency:
  group: strategy-stats-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy to Linux VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.STATS_SSH_HOST }}
          username: ${{ secrets.STATS_SSH_USER }}
          key: ${{ secrets.STATS_SSH_KEY }}
          port: ${{ secrets.STATS_SSH_PORT || '22' }}
          command_timeout: 20m
          script_stop: true
          script: |
            set -euo pipefail

            REPO_DIR="${HOME}/kog_strategy"
            SERVICE_DIR="${REPO_DIR}/services/strategy-stats"

            test -d "${REPO_DIR}/.git" || { echo "FATAL: ${REPO_DIR} is not a git checkout"; exit 1; }
            test -f "${SERVICE_DIR}/.env" || { echo "FATAL: ${SERVICE_DIR}/.env missing — create it from .env.example before enabling CD"; exit 1; }

            cd "${REPO_DIR}"
            git fetch --prune origin main
            git checkout main
            git pull --ff-only origin main

            cd "${SERVICE_DIR}"

            echo "==> Bringing up postgres"
            docker compose up --build -d postgres

            echo "==> Building ingest + web images"
            # Must build before `compose run` — otherwise alembic runs against
            # the cached image and code changes (e.g. settings.py) don't apply.
            docker compose build ingest web

            echo "==> Running alembic upgrade head"
            docker compose run --rm ingest alembic upgrade head

            echo "==> Starting ingest + web"
            docker compose up -d ingest web

            echo "==> Pruning dangling images"
            docker image prune -f

            echo "==> Post-deploy state"
            docker compose ps

            echo "==> Smoke check /healthz on loopback"
            for i in 1 2 3 4 5; do
              if curl -fsS --max-time 5 http://127.0.0.1:8080/healthz; then
                echo
                echo "Deploy OK"
                exit 0
              fi
              echo "healthz attempt ${i} failed, retrying..."
              sleep 3
            done
            echo "FATAL: /healthz did not become healthy after deploy"
            docker compose logs --tail=100 web
            exit 1

  notify:
    needs: deploy
    if: always() && needs.deploy.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_MONITOR_BOT_TOKEN }}
          CHAT_IDS: ${{ vars.TELEGRAM_MONITOR_ALLOWED_USER_IDS }}
          STATUS: ${{ needs.deploy.result }}
        run: |
          set -u
          if [ -z "${BOT_TOKEN:-}" ]; then
            echo "::warning::secrets.TELEGRAM_MONITOR_BOT_TOKEN is not set -- cannot notify"
            exit 0
          fi
          if [ -z "${CHAT_IDS:-}" ]; then
            echo "::warning::vars.TELEGRAM_MONITOR_ALLOWED_USER_IDS is empty -- cannot notify"
            exit 0
          fi

          if [ "${STATUS}" = "success" ]; then tag='[OK]'; else tag='[FAIL]'; fi
          sha='${{ github.sha }}'
          short_sha="${sha:0:7}"
          run_url='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          msg="$(printf '%s\n%s\n%s\n%s' \
            "${tag} strategy-stats deploy ${STATUS}" \
            "branch: ${{ github.ref_name }}@${short_sha}" \
            "actor: ${{ github.actor }}" \
            "${run_url}")"

          sent=0
          failed=0
          IFS=','
          for raw_id in ${CHAT_IDS}; do
            id="$(echo "${raw_id}" | tr -d '[:space:]')"
            [ -z "${id}" ] && continue
            http_code=$(curl -sS -o /tmp/tg_resp -w '%{http_code}' \
              --max-time 10 \
              -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${id}" \
              --data-urlencode "text=${msg}" \
              --data-urlencode "disable_web_page_preview=true" || echo "000")
            if [ "${http_code}" = "200" ]; then
              echo "notified ${id}"
              sent=$((sent + 1))
            else
              echo "::error::${id} : http=${http_code} body=$(cat /tmp/tg_resp 2>/dev/null || true)"
              failed=$((failed + 1))
            fi
          done

          echo "Notify summary: sent=${sent} failed=${failed}"
          if [ "${sent}" -eq 0 ]; then
            echo "::error::All Telegram notifications failed"
            exit 1
          fi
