name: Deploy EAs & Agents

# Redeploy-all trigger: 2026-05-12 (push Zone EA v3.05 — InpUseCommonDir default flipped to false)

on:
  push:
    branches: [main]
    paths:
      - 'strategies/**'
      - 'shared/**'
      - 'deploy.json'
      - 'scripts/**'
      - '.github/workflows/**'

  workflow_dispatch:
    inputs:
      force_all:
        description: 'Deploy all strategies (ignore change detection)'
        type: boolean
        default: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      strategies_ea:     ${{ steps.changes.outputs.strategies_ea }}
      strategies_agent:  ${{ steps.changes.outputs.strategies_agent }}
      strategies_config: ${{ steps.changes.outputs.strategies_config }}
      shared_changed:    ${{ steps.changes.outputs.shared_changed }}
      vps_matrix:        ${{ steps.changes.outputs.vps_matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed components (EA vs agent vs config)
        id: changes
        shell: pwsh
        run: |
          $config = Get-Content "deploy.json" -Raw | ConvertFrom-Json
          $allStrats = $config.strategies.PSObject.Properties.Name
          $allAgentStrats = $config.strategies.PSObject.Properties |
            Where-Object { $_.Value.agent -and $_.Value.agent.enabled -eq $true } |
            Select-Object -ExpandProperty Name

          # Build a JSON array literal manually -- PS 5.1's ConvertTo-Json wraps
          # single-element arrays into an object instead of an array.
          function ConvertTo-JsonArray($items) {
            if (-not $items -or $items.Count -eq 0) { return "[]" }
            return '[' + (($items | ForEach-Object { '"' + $_ + '"' }) -join ',') + ']'
          }

          # Collect all distinct VPS labels for a given set of strategy names.
          # Terminals without a "vps" field default to "vps-sg" (backward-compat).
          function Get-VpsMatrix($stratNames) {
            $vpsSeen = @{}
            foreach ($sName in $stratNames) {
              $strat = $config.strategies.$sName
              if (-not $strat) { continue }
              foreach ($termName in @($strat.deploy_to)) {
                if ([string]::IsNullOrEmpty($termName)) { continue }
                $term = $config.terminals.$termName
                if (-not $term) { continue }
                if ($term.vps) { $v = $term.vps } else { $v = 'vps-sg' }
                $vpsSeen[$v] = 1
              }
            }
            return @($vpsSeen.Keys)
          }

          # All VPS labels across all terminals (used when deploy.json itself changes)
          function Get-AllVps() {
            $vpsSeen = @{}
            foreach ($prop in $config.terminals.PSObject.Properties) {
              $term = $prop.Value
              if ($term.vps) { $v = $term.vps } else { $v = 'vps-sg' }
              $vpsSeen[$v] = 1
            }
            return @($vpsSeen.Keys)
          }

          if ("${{ github.event.inputs.force_all }}" -eq "true") {
            $vpsAll = Get-AllVps
            echo "strategies_ea=$(ConvertTo-JsonArray $allStrats)" >> $env:GITHUB_OUTPUT
            echo "strategies_agent=$(ConvertTo-JsonArray $allAgentStrats)" >> $env:GITHUB_OUTPUT
            echo "strategies_config=$(ConvertTo-JsonArray $allStrats)" >> $env:GITHUB_OUTPUT
            echo "shared_changed=true" >> $env:GITHUB_OUTPUT
            echo "vps_matrix=$(ConvertTo-JsonArray $vpsAll)" >> $env:GITHUB_OUTPUT
            return
          }

          $diff = git diff --name-only HEAD~1 HEAD
          $ea = @()
          $agent = @()
          $cfgStrats = @()
          foreach ($file in $diff) {
            if ($file -match "^strategies/([^/]+)/ea/") {
              $n = $Matches[1]
              if ($ea -notcontains $n) { $ea += $n }
            }
            if ($file -match "^strategies/([^/]+)/agent/") {
              $n = $Matches[1]
              if ($agent -notcontains $n) { $agent += $n }
            }
            if ($file -match "^strategies/([^/]+)/config/") {
              $n = $Matches[1]
              if ($cfgStrats -notcontains $n) { $cfgStrats += $n }
            }
          }

          # Shared agent code -> all agents
          $sharedChanged = ($diff | Where-Object { $_ -match "^shared/" }).Count -gt 0
          if ($sharedChanged) {
            foreach ($n in $allAgentStrats) {
              if ($agent -notcontains $n) { $agent += $n }
            }
          }

          # deploy.json or workflow changes -> safest to redeploy everything
          $configChanged = ($diff | Where-Object { $_ -match "^(deploy\.json|\.github/workflows/)" }).Count -gt 0
          if ($configChanged) {
            $ea = $allStrats
            $agent = $allAgentStrats
            $cfgStrats = $allStrats
          }

          # Per-script change -> only that side
          $eaScriptChanged = ($diff | Where-Object { $_ -match "^scripts/(deploy-ea|link_ea|deploy-account-configs|_lib)\.ps1$" }).Count -gt 0
          if ($eaScriptChanged) { $ea = $allStrats }

          $agentScriptChanged = ($diff | Where-Object { $_ -match "^scripts/setup-agent\.ps1$" }).Count -gt 0
          if ($agentScriptChanged) { $agent = $allAgentStrats }

          # Build vps_matrix: union of VPS labels for all touched strategies
          $allTouchedStrats = @()
          foreach ($n in $ea) { if ($allTouchedStrats -notcontains $n) { $allTouchedStrats += $n } }
          foreach ($n in $agent) { if ($allTouchedStrats -notcontains $n) { $allTouchedStrats += $n } }
          foreach ($n in $cfgStrats) { if ($allTouchedStrats -notcontains $n) { $allTouchedStrats += $n } }

          if ($configChanged) {
            $vpsLabels = Get-AllVps
          } else {
            $vpsLabels = Get-VpsMatrix $allTouchedStrats
          }

          echo "strategies_ea=$(ConvertTo-JsonArray $ea)" >> $env:GITHUB_OUTPUT
          echo "strategies_agent=$(ConvertTo-JsonArray $agent)" >> $env:GITHUB_OUTPUT
          echo "strategies_config=$(ConvertTo-JsonArray $cfgStrats)" >> $env:GITHUB_OUTPUT
          echo "shared_changed=$sharedChanged" >> $env:GITHUB_OUTPUT
          echo "vps_matrix=$(ConvertTo-JsonArray $vpsLabels)" >> $env:GITHUB_OUTPUT
          Write-Host "EA: $($ea -join ',')   Agent: $($agent -join ',')   Config: $($cfgStrats -join ',')   VPS: $($vpsLabels -join ',')"

  validate-configs:
    needs: detect-changes
    if: needs.detect-changes.outputs.strategies_config != '[]' || needs.detect-changes.outputs.vps_matrix != '[]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate per-account config files
        shell: pwsh
        run: ./scripts/validate-account-configs.ps1

  compile-and-deploy:
    needs: [detect-changes, validate-configs]
    if: needs.detect-changes.outputs.vps_matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        vps: ${{ fromJSON(needs.detect-changes.outputs.vps_matrix) }}
    runs-on: [self-hosted, "${{ matrix.vps }}"]
    steps:
      - name: Stop agent services to release workspace locks
        if: needs.detect-changes.outputs.strategies_agent != '[]' && needs.detect-changes.outputs.strategies_agent != ''
        shell: powershell
        run: |
          $nssm = Get-Command nssm -ErrorAction SilentlyContinue
          if (-not $nssm) {
            Write-Host "NSSM not installed - nothing to stop"
            return
          }
          foreach ($svc in @('zone_signal_agent','conde_signal_agent','gvfx_signal_agent','telegram_monitor_bot')) {
            # Skip services that haven't been installed yet (first deploy of a new
            # agent -- NSSM install is a one-time manual step on the VPS). Without
            # this guard, `nssm status` writes to stderr and PowerShell raises
            # NativeCommandError, failing the whole step.
            if (-not (Get-Service -Name $svc -ErrorAction SilentlyContinue)) {
              Write-Host "[$svc] service not installed - skip"
              continue
            }
            $status = (& nssm status $svc 2>&1) | Out-String
            if ($status -match "RUNNING|PAUSED|START_PENDING|STOP_PENDING") {
              Write-Host "[$svc] stopping (status: $($status.Trim()))"
              & nssm stop $svc 2>&1 | Write-Host
              # Poll until SCM reports SERVICE_STOPPED. Without this the next
              # `nssm start` (post setup) raced an in-flight stop and SCM
              # responded SERVICE_PAUSED -- see run 25419001413 (2026-05-06).
              for ($i = 0; $i -lt 15; $i++) {
                Start-Sleep -Seconds 1
                $post = (& nssm status $svc 2>&1) | Out-String
                if ($post -match "SERVICE_STOPPED") { break }
              }
              Write-Host "[$svc] post-stop status: $($post.Trim())"
            } else {
              Write-Host "[$svc] not running - skip (status: $($status.Trim()))"
            }
          }

      - uses: actions/checkout@v4
        with:
          clean: false  # preserve agent runtime: .venv, .env, data/*.json, logs/

      - name: Deploy & compile EAs in-place at each MT5 terminal
        if: needs.detect-changes.outputs.strategies_ea != '[]' && needs.detect-changes.outputs.strategies_ea != ''
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          .\scripts\deploy-ea.ps1 -Strategies '${{ needs.detect-changes.outputs.strategies_ea }}' -Vps '${{ matrix.vps }}'

      - name: Sync per-account configs
        if: needs.detect-changes.outputs.strategies_config != '[]' && needs.detect-changes.outputs.strategies_config != ''
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          .\scripts\deploy-account-configs.ps1 -Vps '${{ matrix.vps }}' -Strategies '${{ needs.detect-changes.outputs.strategies_config }}'

      - name: Setup/update agents (if needed)
        if: needs.detect-changes.outputs.strategies_agent != '[]' && needs.detect-changes.outputs.strategies_agent != ''
        shell: powershell
        env:
          # Shared (fallback when no per-strategy override)
          REDIS_URL: ${{ secrets.REDIS_URL }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          # zone_signal
          ZONE_SIGNAL_MT5_ACCOUNTS: ${{ secrets.ZONE_SIGNAL_MT5_ACCOUNTS }}
          ZONE_SIGNAL_REDIS_STREAM: ${{ vars.ZONE_SIGNAL_REDIS_STREAM }}
          ZONE_SIGNAL_REDIS_GROUP: ${{ vars.ZONE_SIGNAL_REDIS_GROUP }}
          ZONE_SIGNAL_REDIS_CONSUMER: ${{ vars.ZONE_SIGNAL_REDIS_CONSUMER }}
          # conde_auto_entry
          CONDE_AUTO_ENTRY_MT5_ACCOUNTS: ${{ secrets.CONDE_AUTO_ENTRY_MT5_ACCOUNTS }}
          CONDE_AUTO_ENTRY_MT5_SYMBOLS: ${{ vars.CONDE_AUTO_ENTRY_MT5_SYMBOLS }}
          CONDE_AUTO_ENTRY_REDIS_STREAM: ${{ vars.CONDE_AUTO_ENTRY_REDIS_STREAM }}
          CONDE_AUTO_ENTRY_REDIS_GROUP: ${{ vars.CONDE_AUTO_ENTRY_REDIS_GROUP }}
          CONDE_AUTO_ENTRY_REDIS_CONSUMER: ${{ vars.CONDE_AUTO_ENTRY_REDIS_CONSUMER }}
          # gvfx_signal
          GVFX_SIGNAL_MT5_ACCOUNTS: ${{ secrets.GVFX_SIGNAL_MT5_ACCOUNTS }}
          GVFX_SIGNAL_MT5_SYMBOLS: ${{ vars.GVFX_SIGNAL_MT5_SYMBOLS }}
          GVFX_SIGNAL_REDIS_STREAM: ${{ vars.GVFX_SIGNAL_REDIS_STREAM }}
          GVFX_SIGNAL_REDIS_GROUP: ${{ vars.GVFX_SIGNAL_REDIS_GROUP }}
          GVFX_SIGNAL_REDIS_CONSUMER: ${{ vars.GVFX_SIGNAL_REDIS_CONSUMER }}
          # telegram_monitor
          TELEGRAM_MONITOR_TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_MONITOR_BOT_TOKEN }}
          TELEGRAM_MONITOR_TELEGRAM_ALLOWED_USER_IDS: ${{ vars.TELEGRAM_MONITOR_ALLOWED_USER_IDS }}
          TELEGRAM_MONITOR_TELEGRAM_ALERT_CHAT_IDS: ${{ vars.TELEGRAM_MONITOR_ALERT_CHAT_IDS }}
          TELEGRAM_MONITOR_TELEGRAM_SIGNAL_STATS_URL: ${{ vars.TELEGRAM_MONITOR_SIGNAL_STATS_URL }}
        run: |
          $ErrorActionPreference = "Stop"
          .\scripts\setup-agent.ps1 -Strategies '${{ needs.detect-changes.outputs.strategies_agent }}' -Vps '${{ matrix.vps }}'

      - name: Start agent services
        if: needs.detect-changes.outputs.strategies_agent != '[]' && needs.detect-changes.outputs.strategies_agent != ''
        shell: powershell
        run: |
          # Counterpart to the "Stop agent services" step at job start. Without
          # this, every deploy leaves agents SERVICE_STOPPED until someone RDPs
          # in to start them -- silent signal loss.
          #
          # GitHub Actions sets $ErrorActionPreference='Stop' by default for
          # `shell: powershell`. nssm.exe writes its "Unexpected status
          # SERVICE_PAUSED in response to START control" message to stderr,
          # which PS converts to a NativeCommandError and aborts the script
          # before the retry loop runs (see run 25419610370, 2026-05-06).
          # Switch to Continue so we can detect failures via post-status check
          # and retry. We still throw at the end if any service is down.
          $ErrorActionPreference = 'Continue'
          $nssm = Get-Command nssm -ErrorAction SilentlyContinue
          if (-not $nssm) {
            Write-Host "NSSM not installed - nothing to start"
            return
          }
          $failed = @()
          foreach ($svc in @('zone_signal_agent','conde_signal_agent','gvfx_signal_agent','telegram_monitor_bot')) {
            if (-not (Get-Service -Name $svc -ErrorAction SilentlyContinue)) {
              Write-Host "[$svc] service not installed - skip"
              continue
            }
            $status = (& nssm status $svc 2>&1) | Out-String
            if ($status -match "RUNNING|START_PENDING") {
              Write-Host "[$svc] already running - skip"
              continue
            }
            if ($status -match "PAUSED|PAUSE_PENDING|CONTINUE_PENDING") {
              # NSSM occasionally leaves a service in PAUSED after a racy
              # restart. `nssm start` from PAUSED returns "already running"
              # and fails the step, so unstick with an explicit stop first.
              Write-Host "[$svc] unsticking from $($status.Trim()) via stop"
              & nssm stop $svc 2>&1 | Write-Host
              Start-Sleep -Seconds 2
            }
            # Retry start up to 3 times with backoff. NSSM's AppThrottle
            # (1500ms default) plus SCM's internal pending state can make a
            # single `nssm start` from a freshly-stopped service return
            # SERVICE_PAUSED even when status BEFORE was SERVICE_STOPPED.
            $up = $false
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              Write-Host "[$svc] starting attempt $attempt (was: $($status.Trim()))"
              & nssm start $svc 2>&1 | Write-Host
              Start-Sleep -Seconds 3
              $post = (& nssm status $svc 2>&1) | Out-String
              if ($post -match "RUNNING|START_PENDING") {
                Write-Host "[$svc] up (status: $($post.Trim()))"
                $up = $true
                break
              }
              Write-Host "[$svc] attempt $attempt failed (status: $($post.Trim())) -- unsticking"
              & nssm stop $svc 2>&1 | Write-Host
              Start-Sleep -Seconds 3
              $status = (& nssm status $svc 2>&1) | Out-String
            }
            if (-not $up) {
              Write-Host "[$svc] FAILED to start after 3 attempts"
              # Diagnostic dump: read back NSSM-captured stderr + the nssm
              # event log entries for this service. Without this the workflow
              # only reports "SERVICE_STOPPED" and we have to RDP into the VPS
              # to see why python actually exited.
              $appDir = (& nssm get $svc AppDirectory 2>&1) | Out-String
              $appDir = $appDir.Trim()
              $stderrPath = Join-Path $appDir 'logs\stderr.log'
              $stdoutPath = Join-Path $appDir 'logs\stdout.log'
              Write-Host "--- [$svc] NSSM Application ---"
              & nssm get $svc Application 2>&1 | Write-Host
              & nssm get $svc AppParameters 2>&1 | Write-Host
              & nssm get $svc AppEnvironmentExtra 2>&1 | Write-Host
              Write-Host "--- [$svc] stderr.log (last 40 lines) ---"
              if (Test-Path $stderrPath) {
                Get-Content $stderrPath -Tail 40 -ErrorAction SilentlyContinue | Write-Host
              } else { Write-Host "(stderr.log missing)" }
              Write-Host "--- [$svc] stdout.log (last 20 lines) ---"
              if (Test-Path $stdoutPath) {
                Get-Content $stdoutPath -Tail 20 -ErrorAction SilentlyContinue | Write-Host
              } else { Write-Host "(stdout.log missing)" }
              Write-Host "--- [$svc] NSSM event log (last 5) ---"
              Get-WinEvent -LogName Application -MaxEvents 200 -ErrorAction SilentlyContinue |
                Where-Object { $_.ProviderName -eq 'nssm' -and $_.Message -like "*$svc*" } |
                Select-Object -First 5 TimeCreated, LevelDisplayName, Message |
                Format-List | Out-String | Write-Host
              $failed += $svc
            }
          }
          if ($failed.Count -gt 0) {
            throw "Services failed to start: $($failed -join ', ')"
          }

      - name: Summary
        shell: powershell
        run: |
          $ea = '${{ needs.detect-changes.outputs.strategies_ea }}' | ConvertFrom-Json
          $agent = '${{ needs.detect-changes.outputs.strategies_agent }}' | ConvertFrom-Json
          $cfg = '${{ needs.detect-changes.outputs.strategies_config }}' | ConvertFrom-Json
          Write-Host "VPS:             ${{ matrix.vps }}"
          Write-Host "EAs deployed:    $(@($ea) -join ', ')"
          Write-Host "Agents deployed: $(@($agent) -join ', ')"
          Write-Host "Configs synced:  $(@($cfg) -join ', ')"
          Write-Host "Shared changed:  ${{ needs.detect-changes.outputs.shared_changed }}"

  notify:
    needs: [detect-changes, compile-and-deploy]
    # Run on success or failure, but skip when nothing was deployed (no signal worth pinging).
    # TODO(v2): parse needs.compile-and-deploy.result per matrix job for per-VPS status lines.
    if: always() && needs.compile-and-deploy.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_MONITOR_BOT_TOKEN }}
          CHAT_IDS: ${{ vars.TELEGRAM_MONITOR_ALLOWED_USER_IDS }}
          STATUS: ${{ needs.compile-and-deploy.result }}
          STRATEGIES_EA: ${{ needs.detect-changes.outputs.strategies_ea }}
          STRATEGIES_AGENT: ${{ needs.detect-changes.outputs.strategies_agent }}
          VPS_MATRIX: ${{ needs.detect-changes.outputs.vps_matrix }}
        run: |
          HAS_TOKEN=$([ -n "$BOT_TOKEN" ] && echo true || echo false)
          echo "Notify diag: token_set=$HAS_TOKEN status=$STATUS vps=$VPS_MATRIX"

          if [ "$HAS_TOKEN" = "false" ]; then
            echo "::warning::secrets.TELEGRAM_MONITOR_BOT_TOKEN is not set -- cannot notify"
            exit 0
          fi

          IFS=',' read -ra RAW_IDS <<< "${CHAT_IDS//[^0-9,]/}"
          if [ ${#RAW_IDS[@]} -eq 0 ]; then
            echo "::warning::vars.TELEGRAM_MONITOR_ALLOWED_USER_IDS is empty -- cannot notify"
            exit 0
          fi

          EA_LIST=$(echo "$STRATEGIES_EA" | python3 -c "import sys,json; print(', '.join(json.load(sys.stdin)) or '(none)')")
          AGENT_LIST=$(echo "$STRATEGIES_AGENT" | python3 -c "import sys,json; print(', '.join(json.load(sys.stdin)) or '(none)')")
          VPS_LIST=$(echo "$VPS_MATRIX" | python3 -c "import sys,json; print(', '.join(json.load(sys.stdin)) or 'n/a')")
          SHA="${{ github.sha }}"
          SHA="${SHA:0:7}"
          TAG=$([ "$STATUS" = "success" ] && echo "[OK]" || echo "[FAIL]")
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          MSG="${TAG} deploy ${STATUS}
          branch: ${{ github.ref_name }}@${SHA}
          actor: ${{ github.actor }}
          VPS: ${VPS_LIST}
          EAs: ${EA_LIST}
          Agents: ${AGENT_LIST}
          ${RUN_URL}"

          SENT=0
          for ID in "${RAW_IDS[@]}"; do
            ID=$(echo "$ID" | tr -d '[:space:]')
            [ -z "$ID" ] && continue
            RESP=$(curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -d chat_id="$ID" \
              --data-urlencode "text=${MSG}" \
              -d disable_web_page_preview=true)
            OK=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ok','false'))" 2>/dev/null || echo false)
            if [ "$OK" = "True" ] || [ "$OK" = "true" ]; then
              echo "notified $ID"
              SENT=$((SENT+1))
            else
              echo "::error::Failed to notify $ID: $RESP"
            fi
          done

          echo "Notify summary: sent=$SENT"
          if [ "$SENT" -eq 0 ]; then
            echo "::error::All Telegram notifications failed"
            exit 1
          fi
